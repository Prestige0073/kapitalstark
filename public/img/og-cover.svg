<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="60%"  stop-color="#0f1c36"/>
      <stop offset="100%" stop-color="#1a2f5e"/>
    </linearGradient>

    <!-- Blue glow for icon -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#267BF1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#267BF1" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    </pattern>

    <!-- Clip for rounded rect icon -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="88" height="88" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circles — top right -->
  <circle cx="1100" cy="80"  r="260" fill="#267BF1" fill-opacity="0.04"/>
  <circle cx="1100" cy="80"  r="180" fill="#267BF1" fill-opacity="0.04"/>
  <circle cx="1100" cy="80"  r="100" fill="#267BF1" fill-opacity="0.05"/>

  <!-- Decorative circles — bottom left -->
  <circle cx="100"  cy="560" r="220" fill="#267BF1" fill-opacity="0.04"/>
  <circle cx="100"  cy="560" r="130" fill="#267BF1" fill-opacity="0.05"/>

  <!-- Glow behind icon -->
  <ellipse cx="152" cy="240" rx="130" ry="130" fill="url(#glowBlue)"/>

  <!-- Logo icon box -->
  <g transform="translate(108, 196)">
    <rect width="88" height="88" rx="22" ry="22" fill="#267BF1"/>
    <!-- Letter K -->
    <text x="44" y="62" font-family="Georgia, serif" font-size="54" font-weight="800"
          fill="#ffffff" text-anchor="middle" dominant-baseline="auto">K</text>
  </g>

  <!-- Brand name -->
  <text x="216" y="242"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="700"
        fill="#ffffff" dominant-baseline="middle" letter-spacing="-0.5">Kapital</text>
  <text x="430" y="242"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="700"
        fill="#267BF1" dominant-baseline="middle" letter-spacing="-0.5">Stark</text>

  <!-- Divider line -->
  <rect x="108" y="302" width="480" height="1.5" fill="#267BF1" opacity="0.5" rx="1"/>

  <!-- Slogan -->
  <text x="108" y="350"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="400" font-style="italic"
        fill="#a8c4f0" letter-spacing="0.3">Votre avenir financier commence ici</text>

  <!-- Tags / pills -->
  <g transform="translate(108, 390)">
    <!-- Pill 1 -->
    <rect width="154" height="34" rx="17" fill="#267BF1" fill-opacity="0.15" stroke="#267BF1" stroke-opacity="0.35" stroke-width="1"/>
    <text x="77" y="17" font-family="Arial, sans-serif" font-size="13" font-weight="600"
          fill="#6db0ff" text-anchor="middle" dominant-baseline="middle">Prêt Immobilier</text>

    <!-- Pill 2 -->
    <rect x="166" width="150" height="34" rx="17" fill="#267BF1" fill-opacity="0.15" stroke="#267BF1" stroke-opacity="0.35" stroke-width="1"/>
    <text x="241" y="17" font-family="Arial, sans-serif" font-size="13" font-weight="600"
          fill="#6db0ff" text-anchor="middle" dominant-baseline="middle">Prêt Personnel</text>

    <!-- Pill 3 -->
    <rect x="328" width="148" height="34" rx="17" fill="#267BF1" fill-opacity="0.15" stroke="#267BF1" stroke-opacity="0.35" stroke-width="1"/>
    <text x="402" y="17" font-family="Arial, sans-serif" font-size="13" font-weight="600"
          fill="#6db0ff" text-anchor="middle" dominant-baseline="middle">Prêt Automobile</text>
  </g>

  <!-- Right side — decorative chart bars -->
  <g transform="translate(740, 160)" opacity="0.9">
    <!-- Chart frame -->
    <rect width="380" height="310" rx="20" fill="#ffffff" fill-opacity="0.03" stroke="#267BF1" stroke-opacity="0.12" stroke-width="1"/>

    <!-- Chart label -->
    <text x="24" y="36" font-family="Arial, sans-serif" font-size="12" font-weight="600"
          fill="#6db0ff" opacity="0.7" letter-spacing="1">CROISSANCE DU PORTEFEUILLE</text>

    <!-- Bars -->
    <g transform="translate(24, 230)">
      <!-- Bar 1 -->
      <rect x="0"   y="-80"  width="38" height="80"  rx="6" fill="#267BF1" fill-opacity="0.3"/>
      <rect x="0"   y="-80"  width="38" height="8"   rx="4" fill="#267BF1"/>
      <!-- Bar 2 -->
      <rect x="52"  y="-120" width="38" height="120" rx="6" fill="#267BF1" fill-opacity="0.3"/>
      <rect x="52"  y="-120" width="38" height="8"   rx="4" fill="#267BF1"/>
      <!-- Bar 3 -->
      <rect x="104" y="-100" width="38" height="100" rx="6" fill="#267BF1" fill-opacity="0.3"/>
      <rect x="104" y="-100" width="38" height="8"   rx="4" fill="#267BF1"/>
      <!-- Bar 4 -->
      <rect x="156" y="-150" width="38" height="150" rx="6" fill="#267BF1" fill-opacity="0.3"/>
      <rect x="156" y="-150" width="38" height="8"   rx="4" fill="#267BF1"/>
      <!-- Bar 5 -->
      <rect x="208" y="-130" width="38" height="130" rx="6" fill="#267BF1" fill-opacity="0.3"/>
      <rect x="208" y="-130" width="38" height="8"   rx="4" fill="#267BF1"/>
      <!-- Bar 6 (tallest = current) -->
      <rect x="260" y="-190" width="38" height="190" rx="6" fill="#267BF1" fill-opacity="0.45"/>
      <rect x="260" y="-190" width="38" height="8"   rx="4" fill="#267BF1"/>
      <!-- Baseline -->
      <rect x="0" y="2" width="306" height="1" fill="#267BF1" fill-opacity="0.2" rx="1"/>
    </g>

    <!-- Trend line -->
    <polyline points="43,210 95,170 147,185 199,140 251,155 299,100"
              fill="none" stroke="#267BF1" stroke-width="2" stroke-opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"
              stroke-dasharray="4 3"/>

    <!-- Stat pills inside chart -->
    <g transform="translate(200, 44)">
      <rect width="130" height="36" rx="10" fill="#267BF1" fill-opacity="0.15"/>
      <text x="65" y="13" font-family="'Courier New', monospace" font-size="17" font-weight="700"
            fill="#267BF1" text-anchor="middle" dominant-baseline="auto">+12,4 %</text>
      <text x="65" y="28" font-family="Arial, sans-serif" font-size="10"
            fill="#6db0ff" text-anchor="middle" dominant-baseline="auto" opacity="0.8">vs année précédente</text>
    </g>
  </g>

  <!-- Bottom stats row -->
  <g transform="translate(108, 476)">
    <!-- Stat 1 -->
    <text x="0"   y="0"  font-family="'Courier New', monospace" font-size="32" font-weight="700" fill="#267BF1">98 %</text>
    <text x="0"   y="22" font-family="Arial, sans-serif" font-size="12" fill="#7a9fc0">Taux de satisfaction</text>

    <!-- Separator -->
    <rect x="140" y="-28" width="1" height="50" fill="#267BF1" fill-opacity="0.2" rx="1"/>

    <!-- Stat 2 -->
    <text x="160" y="0"  font-family="'Courier New', monospace" font-size="32" font-weight="700" fill="#267BF1">24h</text>
    <text x="160" y="22" font-family="Arial, sans-serif" font-size="12" fill="#7a9fc0">Réponse garantie</text>

    <!-- Separator -->
    <rect x="300" y="-28" width="1" height="50" fill="#267BF1" fill-opacity="0.2" rx="1"/>

    <!-- Stat 3 -->
    <text x="320" y="0"  font-family="'Courier New', monospace" font-size="32" font-weight="700" fill="#267BF1">15 k+</text>
    <text x="320" y="22" font-family="Arial, sans-serif" font-size="12" fill="#7a9fc0">Clients accompagnés</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#267BF1" fill-opacity="0.08"/>
  <rect x="0" y="622" width="1200" height="8"  fill="#267BF1" fill-opacity="0.15"/>

  <!-- ACPR badge bottom right -->
  <text x="1092" y="596" font-family="Arial, sans-serif" font-size="11"
        fill="#4a6a9a" text-anchor="middle">Agréé ACPR · kapitalstark.fr</text>
</svg>
